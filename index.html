<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Mario Coin Flip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>COIN FLIP!</h1>
  <p class="subtitle" id="subtext">PRESS START — BEAT THE CLOCK!</p>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-box">
      <div class="hud-label">TIME</div>
      <div class="hud-value" id="timerDisplay">15</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">COINS</div>
      <div class="hud-value coins" id="scoreNum">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="bestDisplay">—</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">PLAYER</div>
      <div class="hud-value" id="playerDisplay" style="font-size:clamp(0.45rem,2.2vw,0.6rem); cursor:pointer;" title="Click to reset name">—</div>
    </div>
  </div>

  <!-- Coin + Block -->
  <div class="coin-area">
    <div class="score-pop" id="scorePop">+1</div>

    <div class="coin" id="coin">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="0" width="8" height="1" fill="#f8d000"/>
        <rect x="2" y="1" width="12" height="1" fill="#f8d000"/>
        <rect x="1" y="2" width="2" height="1" fill="#f8d000"/>
        <rect x="3" y="2" width="2" height="1" fill="#fae84a"/>
        <rect x="5" y="2" width="6" height="1" fill="#f8d000"/>
        <rect x="11" y="2" width="1" height="1" fill="#c9a000"/>
        <rect x="12" y="2" width="2" height="1" fill="#f8d000"/>
        <rect x="1" y="3" width="2" height="1" fill="#f8d000"/>
        <rect x="3" y="3" width="2" height="1" fill="#fae84a"/>
        <rect x="5" y="3" width="6" height="1" fill="#fae84a"/>
        <rect x="11" y="3" width="1" height="1" fill="#c9a000"/>
        <rect x="12" y="3" width="2" height="1" fill="#f8d000"/>
        <rect x="1" y="4" width="2" height="10" fill="#f8d000"/>
        <rect x="3" y="4" width="2" height="2" fill="#fae84a"/>
        <rect x="5" y="4" width="6" height="1" fill="#fae84a"/>
        <rect x="11" y="4" width="1" height="2" fill="#c9a000"/>
        <rect x="12" y="4" width="2" height="10" fill="#f8d000"/>
        <rect x="5" y="5" width="6" height="1" fill="#f8d000"/>
        <rect x="3" y="6" width="2" height="1" fill="#fae84a"/>
        <rect x="5" y="6" width="6" height="1" fill="#fae84a"/>
        <rect x="11" y="6" width="1" height="1" fill="#c9a000"/>
        <rect x="3" y="7" width="2" height="1" fill="#fae84a"/>
        <rect x="5" y="7" width="6" height="4" fill="#fae84a"/>
        <rect x="11" y="7" width="1" height="4" fill="#c9a000"/>
        <rect x="3" y="8" width="2" height="1" fill="#fae84a"/>
        <rect x="3" y="9" width="2" height="1" fill="#fae84a"/>
        <rect x="3" y="10" width="2" height="1" fill="#fae84a"/>
        <rect x="3" y="11" width="2" height="1" fill="#fae84a"/>
        <rect x="5" y="11" width="6" height="1" fill="#f8d000"/>
        <rect x="11" y="11" width="1" height="1" fill="#c9a000"/>
        <rect x="3" y="12" width="2" height="1" fill="#c9a000"/>
        <rect x="5" y="12" width="6" height="1" fill="#c9a000"/>
        <rect x="11" y="12" width="1" height="1" fill="#c9a000"/>
        <rect x="1" y="13" width="2" height="1" fill="#f8d000"/>
        <rect x="3" y="13" width="10" height="1" fill="#f8d000"/>
        <rect x="13" y="13" width="2" height="1" fill="#f8d000"/>
        <rect x="2" y="14" width="12" height="1" fill="#f8d000"/>
        <rect x="4" y="15" width="8" height="1" fill="#f8d000"/>
      </svg>
    </div>

    <div class="block" id="block" onclick="handleFlip()">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="16" height="16" fill="#c07000"/>
        <rect x="1" y="1" width="14" height="14" fill="#e8a000"/>
        <rect x="1" y="1" width="14" height="2" fill="#f5c000"/>
        <rect x="1" y="1" width="2"  height="12" fill="#f5c000"/>
        <rect x="1" y="13" width="14" height="2" fill="#a06000"/>
        <rect x="13" y="1" width="2"  height="12" fill="#a06000"/>
        <rect x="6"  y="3" width="4" height="1" fill="#fff"/>
        <rect x="5"  y="4" width="1" height="1" fill="#fff"/>
        <rect x="9"  y="4" width="1" height="1" fill="#fff"/>
        <rect x="9"  y="5" width="1" height="1" fill="#fff"/>
        <rect x="8"  y="6" width="1" height="1" fill="#fff"/>
        <rect x="7"  y="7" width="1" height="1" fill="#fff"/>
        <rect x="7"  y="9" width="1" height="1" fill="#fff"/>
        <rect x="7"  y="11" width="1" height="1" fill="#fff"/>
      </svg>
    </div>
  </div>

  <!-- Action buttons -->
  <button class="btn btn-green" id="startBtn" onclick="startGame()">START!</button>
  <button class="btn" id="hitBtn" onclick="handleFlip()" disabled>HIT BLOCK!</button>

  <!-- Game Over overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <div class="overlay-title">TIME'S UP!</div>
      <div class="overlay-score">YOU FLIPPED<br><b id="finalScore">0</b><br>COINS!</div>
      <div class="name-row" id="nameRow">
        <div class="name-label">ENTER YOUR NAME</div>
        <input class="name-input" id="nameInput" maxlength="10" placeholder="AAA" autocomplete="off"/>
        <div class="name-label" style="color:#bbb; font-size:0.32rem;">THIS NAME WILL BE LOCKED TO YOUR DEVICE</div>
      </div>
      <button class="btn btn-green" id="saveBtn" onclick="saveScore()">SAVE SCORE</button>
      <button class="btn btn-red" style="font-size:0.55rem; padding:10px 20px;" onclick="closeOverlay()">SKIP</button>
    </div>
  </div>

  <!-- High score table -->
  <div class="hs-section">
    <div class="hs-title">— HIGH SCORES —</div>
    <table class="hs-table">
      <thead>
        <tr>
          <th>#</th>
          <th>NAME</th>
          <th>COINS</th>
          <th>DATE</th>
        </tr>
      </thead>
      <tbody id="hsBody">
        <tr><td colspan="4" class="hs-empty">NO SCORES YET — BE THE FIRST!</td></tr>
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
